name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Type-check
        run: npm run compile

      - name: Package
        run: npm run package

      - name: Upload .vsix
        uses: actions/upload-artifact@v4
        with:
          name: assigned-${{ github.sha }}
          path: "*.vsix"
          retention-days: 30
